<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      @page { size: A4; margin: 22mm 19mm; }
      body { color: #172033; font-family: Arial, sans-serif; font-size: 11pt; line-height: 1.58; }
      header { border-bottom: 2px solid #164e63; padding-bottom: 10px; margin-bottom: 24px; }
      h1 { margin: 0; color: #0f172a; font-size: 21pt; }
      .meta { color: #526173; margin-top: 4px; }
      p { margin: 0 0 13px; }
      .signature { margin-top: 22px; font-weight: 700; }
    </style>
  </head>
  <body>
    <header>
      <h1>{{ profile.name }}</h1>
      <p class="meta">{{ role_title }} | {{ company_name }} | {{ generated_at }}</p>
    </header>
    <p>{{ letter.greeting }}</p>
    {% for paragraph in letter.paragraphs %}
    <p>{{ paragraph }}</p>
    {% endfor %}
    <p>{{ letter.closing }}</p>
    <p class="signature">{{ letter.signature }}</p>
  </body>
</html>
